name: Sync Upstream & Trigger Build

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    name: Sync from dani-garcia/vaultwarden
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # required to dispatch build-release.yml

    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN cannot trigger other workflows by design.
          # Register a PAT with Contents + Workflows write access
          # as a secret named SYNC_TOKEN.
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/dani-garcia/vaultwarden.git

      - name: Fetch upstream (tags included)
        run: git fetch upstream --tags --prune --prune-tags

      # NOTE: We intentionally do NOT sync the default branch from upstream.
      # This fork carries its own commits on main (ARM64 build pipeline,
      # scripts/, customised README), which always conflict with upstream's
      # changes on the same files (README.md) during rebase. Builds are driven
      # purely by tags (see build-release.yml), so the fork's main content is
      # irrelevant to which version gets built. Only tag propagation matters.

      - name: Detect and push new upstream tags
        run: |
          # vaultwarden tags have no 'v' prefix (e.g. 1.35.7)
          UPSTREAM_TAGS=$(git ls-remote --tags upstream 'refs/tags/[0-9]*' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||' \
            | grep -v '\^{}' \
            | sort -V)

          FORK_TAGS=$(git ls-remote --tags origin 'refs/tags/[0-9]*' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||' \
            | grep -v '\^{}')

          NEW_TAGS=()
          for tag in $UPSTREAM_TAGS; do
            if ! echo "${FORK_TAGS}" | grep -qx "${tag}"; then
              NEW_TAGS+=("${tag}")
            fi
          done

          if [ ${#NEW_TAGS[@]} -eq 0 ]; then
            echo "No new tags found. Fork is up-to-date."
            exit 0
          fi

          echo "New tags to push: ${NEW_TAGS[*]}"
          for tag in "${NEW_TAGS[@]}"; do
            echo "  Pushing tag: ${tag}"
            # The tag points at an upstream commit whose tree does NOT contain
            # build-release.yml, so a tag push alone cannot trigger the ARM64
            # build. The tag is still pushed so the release can attach to it and
            # build-release can check it out.
            git push origin "refs/tags/${tag}"
          done

          # Hand the list to the next step (bash arrays don't cross steps).
          echo "NEW_TAGS=${NEW_TAGS[*]}" >> "$GITHUB_ENV"

      - name: Dispatch ARM64 build for new tags
        if: env.NEW_TAGS != ''
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          for tag in ${NEW_TAGS}; do
            echo "Dispatching build-release.yml for ${tag}"
            gh workflow run build-release.yml \
              --repo "${GITHUB_REPOSITORY}" \
              --ref main \
              -f tag="${tag}"
          done

      - name: Summary
        run: |
          echo "### Sync complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Fork is now in sync with upstream dani-garcia/vaultwarden." >> "$GITHUB_STEP_SUMMARY"
